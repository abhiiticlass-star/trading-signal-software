<!DOCTYPE html>
<html>
<head>
    <title>ABHI'S ALGO V9.8</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #1a1a1a; padding: 20px; border-radius: 15px; margin: 10px; border: 1px solid #333; }
        .signal { font-size: 24px; font-weight: bold; margin: 20px 0; }
        select { width: 100%; padding: 10px; border-radius: 5px; background: #333; color: #fff; }
    </style>
</head>
<body>
    <h1>ABHI'S ALGO V9.8</h1>
    <div class="box">
        <select id="asset"><option>EUR/USD</option><option>GBP/USD</option><option>USD/JPY</option></select>
        <select id="tf" style="margin-top:10px;"><option value="1">1 Min</option><option value="5">5 Min</option></select>
    </div>
    <div class="box signal" id="signal-display">CALCULATING...</div>
    <script>
        async function update() {
            let asset = document.getElementById('asset').value;
            let tf = document.getElementById('tf').value;
            let res = await fetch(`/get_signal/${asset}/${tf}`);
            let data = await res.json();
            document.getElementById('signal-display').innerHTML = data.signal + " " + data.icon;
        }
        setInterval(update, 3000);
        update();
    </script>
</body>
</html>
